# Render.com Blueprint - Laravel PHP Application
# Explicitly configured for PHP to avoid Node.js auto-detection

services:
  - type: web
    name: rental-system
    runtime: php82  # Explicitly set PHP 8.2
    region: oregon
    plan: free
    
    # Explicitly ignore Node.js files
    ignoreNodeModules: true
    
    # Build and deployment settings
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate
      php artisan config:cache --no-interaction
      php artisan route:cache --no-interaction
    
    # Start command for PHP/Laravel built-in server
    startCommand: php -S 0.0.0.0:10000 -t public
    
    # Health check
    healthCheckPath: /
    
    # Environment variables
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true  # Auto-generate APP_KEY
      
      # Database - configure these in Render dashboard
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

# PostgreSQL Database
databases:
  - name: rental-system-db
    databaseName: rental_system
    plan: free
    ipAllowList: []
